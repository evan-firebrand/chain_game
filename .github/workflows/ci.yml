name: CI

on:
  push:
    branches: [main, 'feat/**', 'fix/**', 'docs/**', 'chore/**', 'arch/**']
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  test:
    name: Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run test:coverage
      - name: Enforce 100% kernel coverage
        run: |
          # Extract kernel coverage from lcov report and fail if <100%
          # This is enforced separately from the global threshold
          node scripts/check-kernel-coverage.js

  boundaries:
    name: Dependency Boundaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run check-boundaries

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint, test, boundaries]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: Bundle size report
        run: |
          du -sh dist/ || true
          find dist -name '*.js' -exec wc -c {} + | sort -rn | head -10 || true
